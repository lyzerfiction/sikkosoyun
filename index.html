<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>sik</title>
<style>
  :root{--bg:#0b1020;--accent:#ffd166;--muted:#7b8aa3}
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Arial}
  body{display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#081022 0%, #071726 100%);color:#fff}
  #gameWrap{width:100%;max-width:640px;height:100vh;display:flex;flex-direction:column}
  header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px}
  .stat{font-size:14px;color:var(--muted)}
  canvas{flex:1;display:block;touch-action:none}
  .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .panel{background:rgba(4,8,20,0.7);backdrop-filter:blur(6px);padding:18px;border-radius:12px;text-align:center;pointer-events:auto}
  button{background:var(--accent);border:none;padding:10px 14px;border-radius:8px;font-weight:600;cursor:pointer}
  .small{font-size:13px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<div id="gameWrap">
  <header>
    <div class="stat">Skorun: <span id="score">0</span></div>
    <div class="stat">Hayatın: <span id="lives">3</span></div>
  </header>
  <div style="position:relative;flex:1;">
    <canvas id="c"></canvas>
    <div class="overlay" id="overlay">
      <div class="panel" id="panel">
        <h2 style="margin:0 0 6px 0">amınakodumun hayatı</h2>
        <div class="small">çemberi ebenin amına oynatarak topu tut.</div>
        <div style="height:12px"></div>
        <button id="startBtn">oyna amınakoyımt</button>
        <div class="small">sağ sol yaparak çemberi döndür ebeni sikim.</div>
      </div>
    </div>
  </div>
</div>

<audio id="successSound" src="basari.ogg" preload="auto"></audio>
<audio id="failSound" src="HASAR.ogg" preload="auto"></audio>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const successSound = document.getElementById('successSound');
  const failSound = document.getElementById('failSound');

  let W = 300, H = 600;
  function resize(){
    const ratio = devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.floor(rect.width * ratio);
    canvas.height = Math.floor(rect.height * ratio);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(ratio,0,0,ratio,0,0);
    W = rect.width; H = rect.height;
  }
  function fitCanvas(){
    canvas.style.width = '100%';
    canvas.style.height = 'calc(100vh - 64px)';
    resize();
  }
  window.addEventListener('resize', ()=>{fitCanvas(); resize();});
  fitCanvas();

  let running = false;
  let bullets = [];
  let lastShot = 0;
  let shotInterval = 1200;
  let bulletSpeed = 100;
  let maxBulletSpeed = 200;
  let score = 0;
  let lives = 3;
  let flashEffect = { active: false, color: '', startTime: 0, duration: 300 };

  let ring = {
    radius: 140,
    minRadius: 90,
    maxRadius: 140,
    thickness: 28,
    segments: 22,
    rotation: 0,
    solidMask: []
  };

  function initMask(){
    const segCount = ring.segments;
    const mask = new Array(segCount).fill(1);
    const segmentSizes = [
      Math.floor(Math.random()*4)+8,  
      Math.floor(Math.random()*3)+5,  
      Math.floor(Math.random()*2)+3   
    ];
    let positions = [];
    for(let i=0;i<3;i++){
      let pos;
      let valid=false;
      while(!valid){
        pos = Math.floor(Math.random()*segCount);
        valid = true;
        for(let j=0;j<positions.length;j++){
          const dist = Math.abs(pos-positions[j]);
          if(dist<segmentSizes[i]+3){valid=false;break;}
        }
      }
      positions.push(pos);
    }
    for(let i=0;i<3;i++){
      const start = positions[i];
      const size = segmentSizes[i];
      for(let s=0;s<size;s++){
        const idx = (start+s)%segCount;
        mask[idx]=0;
      }
    }
    ring.solidMask = mask;
  }
  initMask();

  function startGame(){
    bullets = [];
    lastShot = performance.now();
    shotInterval = 1200;
    bulletSpeed = 100;
    score = 0; lives = 3;
    ring.rotation = 0;
    ring.radius = ring.maxRadius;
    flashEffect.active = false;
    initMask();
    running = true;
    overlay.style.display='none';
    updateHUD();
    loop(performance.now());
  }

  function gameOver(){
    running = false;
    flashEffect.active = false;
    const flashDiv = document.getElementById('gameFlash');
    if(flashDiv) flashDiv.style.display = 'none';
    overlay.style.display = 'flex';
    document.getElementById('panel').innerHTML = `
      <h2 style="margin:0 0 6px 0">oynayacagın oyunu sikim</h2>
      <div class="small">skorun:: <strong>${score}</strong></div>
      <div style=\"height:12px\"></div>
      <button id=\"retryBtn\">malsın bi daha oyna</button>
    `;
    document.getElementById('retryBtn').addEventListener('click', ()=>{ startGame(); });
  }

  function triggerFlash(color){
    flashEffect.active = true;
    flashEffect.color = color;
    flashEffect.startTime = performance.now();
  }

  function spawnBullet(now){
    const angle = Math.random() * Math.PI * 2;
    bullets.push({angle: angle, r: 10, speed: bulletSpeed, created: now});
  }

  function update(dt, now){
    if(now - lastShot > shotInterval){
      spawnBullet(now);
      lastShot = now;
      if(shotInterval > 300) shotInterval *= 0.985;
    }
    for(let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      b.r += b.speed * dt;
      const hitRadius = ring.radius;
      const bulletRadius = 8;
      if(b.r >= hitRadius - ring.thickness/2 - bulletRadius){
        let a = b.angle % (Math.PI*2);
        if(a<0) a+=Math.PI*2;
        let rel = a - ring.rotation;
        rel = (rel % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
        const segAngle = (Math.PI*2)/ring.segments;
        const idx = Math.floor(rel / segAngle);
        const solid = ring.solidMask[idx];
        if(solid){
          bullets.splice(i,1);
          score++;
          successSound.currentTime = 0; successSound.play();
          triggerFlash('rgba(127, 209, 255, 0.4)');
          if(bulletSpeed < maxBulletSpeed) bulletSpeed += 2;
          if(shotInterval > 300) shotInterval *= 0.985;
          ring.radius = Math.max(ring.minRadius, ring.radius - 0.6);
          updateHUD();
        } else {
          bullets.splice(i,1);
          lives--;
          failSound.currentTime = 0; failSound.play();
          triggerFlash('rgba(255, 80, 80, 0.4)');
          updateHUD();
          if(lives <= 0){ gameOver(); return; }
        }
      }
      if(b.r > Math.max(W,H)+200) bullets.splice(i,1);
    }
  }

  function updateHUD(){
    scoreEl.textContent = score;
    livesEl.textContent = lives;
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    for(let i=0;i<10;i++){
      ctx.beginPath();
      const r = ring.minRadius + (ring.maxRadius - ring.minRadius)*(i/9);
      ctx.arc(W/2,H/2,r,0,Math.PI*2);
      ctx.stroke();
    }
    ctx.save();
    ctx.translate(W/2,H/2);
    ctx.fillStyle = '#fff';
    ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.fill();ctx.closePath();
    ctx.beginPath();ctx.arc(0,0,34,0,Math.PI*2);ctx.strokeStyle='rgba(255,209,102,0.08)';ctx.lineWidth=8;ctx.stroke();ctx.closePath();
    ctx.restore();
    for(const b of bullets){
      const x = W/2 + Math.cos(b.angle) * b.r;
      const y = H/2 + Math.sin(b.angle) * b.r;
      ctx.beginPath();ctx.fillStyle='#ffd166';ctx.arc(x,y,8,0,Math.PI*2);ctx.fill();ctx.closePath();
    }
    ctx.save();
    ctx.translate(W/2,H/2);
    const segAngle = (Math.PI*2)/ring.segments;
    for(let i=0;i<ring.segments;i++){
      const start = i*segAngle + ring.rotation;
      const end = start + segAngle;
      ctx.beginPath();
      ctx.arc(0,0,ring.radius, start, end);
      ctx.lineWidth = ring.thickness;
      ctx.strokeStyle = ring.solidMask[i] ? '#7fd1ff' : 'rgba(255,255,255,0.06)';
      ctx.stroke();
    }
    ctx.restore();
  }

  let lastTime = 0;
  function loop(now){
    if(!running) return;
    if(!lastTime) lastTime = now;
    const dt = (now - lastTime)/1000;
    update(dt, now);
    draw();
    drawFlash();
    lastTime = now;
    requestAnimationFrame(loop);
  }

  function drawFlash(){
    if(!flashEffect.active) return;
    const elapsed = performance.now() - flashEffect.startTime;
    if(elapsed < flashEffect.duration){
      const progress = elapsed / flashEffect.duration;
      const opacity = (1 - progress);
      let flashDiv = document.getElementById('gameFlash');
      if(!flashDiv){
        flashDiv = document.createElement('div');
        flashDiv.id = 'gameFlash';
        flashDiv.style.cssText = `position: fixed;inset: 0;pointer-events: none;z-index: 9999;`;
        document.body.appendChild(flashDiv);
      }
      const color = flashEffect.color.match(/rgba?\(([^)]+)\)/)[1].split(',').slice(0,3).join(',');
      flashDiv.style.background = `radial-gradient(circle at center, rgba(${color},0) 0%, rgba(${color},${opacity * 0.3}) 60%, rgba(${color},${opacity * 0.6}) 100%)`;
      flashDiv.style.display = 'block';
    } else {
      flashEffect.active = false;
      const flashDiv = document.getElementById('gameFlash');
      if(flashDiv) flashDiv.style.display = 'none';
    }
  }

  let dragging = false; let lastAngle = 0;
  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    let x,y;
    if(e.touches && e.touches[0]){ x = e.touches[0].clientX; y = e.touches[0].clientY; }
    else { x = e.clientX; y = e.clientY; }
    return {x: x - rect.left, y: y - rect.top};
  }
  function angleFromCenter(p){ return Math.atan2(p.y - H/2, p.x - W/2); }
  canvas.addEventListener('pointerdown', (ev)=>{
    canvas.setPointerCapture(ev.pointerId);
    dragging = true;
    const p = getPos(ev);
    lastAngle = angleFromCenter(p);
  });
  canvas.addEventListener('pointermove', (ev)=>{
    if(!dragging) return;
    const p = getPos(ev);
    const a = angleFromCenter(p);
    const delta = a - lastAngle;
    ring.rotation += delta;
    lastAngle = a;
  });
  canvas.addEventListener('pointerup', ()=>{ dragging = false; });
  canvas.addEventListener('pointercancel', ()=>{ dragging = false; });
  canvas.addEventListener('click', (ev)=>{
    const p = getPos(ev);
    if(p.x < W/2) ring.rotation -= 0.25; else ring.rotation += 0.25;
  });

  startBtn.addEventListener('click', startGame);
  resize(); draw();
})();
</script>
</body>
</html>
